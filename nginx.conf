worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Timeouts for long-running review operations
  proxy_connect_timeout 10s;
  proxy_read_timeout 900s;
  proxy_send_timeout 900s;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  server {
    listen 80;

    # Docker DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $web_upstream http://web:3000;
    set $engine_upstream http://review-engine:3000;

    # Webhook routes → review-engine
    location /api/github/webhook {
      proxy_pass $engine_upstream;
      include /etc/nginx/proxy_params;
    }

    location /api/bitbucket/webhook {
      proxy_pass $engine_upstream;
      include /etc/nginx/proxy_params;
    }

    # CLI heavy endpoints → review-engine (review, local-review, index, analyze)
    location ~ ^/api/cli/[^/]+/review$ {
      proxy_pass $engine_upstream;
      include /etc/nginx/proxy_params;
    }

    location ~ ^/api/cli/[^/]+/local-review$ {
      proxy_pass $engine_upstream;
      include /etc/nginx/proxy_params;
    }

    location ~ ^/api/cli/[^/]+/index$ {
      proxy_pass $engine_upstream;
      include /etc/nginx/proxy_params;
    }

    location ~ ^/api/cli/[^/]+/analyze$ {
      proxy_pass $engine_upstream;
      include /etc/nginx/proxy_params;
    }

    # GitHub Action review endpoint → review-engine
    location /api/github-action/ {
      proxy_pass $engine_upstream;
      include /etc/nginx/proxy_params;
    }

    # Everything else → web
    location / {
      proxy_pass $web_upstream;
      include /etc/nginx/proxy_params;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_buffering off;
    }
  }
}
