version: '3.8'

services:
  web:
    image: octopus-web:latest
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://octopus:octopus@octopus-db:5432/octopus
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
    networks:
      - octopus_network
    ports:
      - "43300:3000"
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  octopus-db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=octopus
      - POSTGRES_PASSWORD=octopus
      - POSTGRES_DB=octopus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - octopus_network
    ports:
      - "43332:5432"
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - octopus_network
    ports:
      - "43333:6333"
      - "43334:6334"
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - octopus_network
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  octopus_network:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
