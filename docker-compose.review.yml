services:
  web:
    image: octopus-web-review:latest
    env_file:
      - .env.production.review
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://octopus:octopus@octopus_octopus-db:5432/octopus
      - QDRANT_URL=http://octopus_qdrant:6333
      - REDIS_URL=redis://octopus_redis:6379
    networks:
      - octopus_octopus_network
    ports:
      - "43305:3000"
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

networks:
  octopus_octopus_network:
    external: true
